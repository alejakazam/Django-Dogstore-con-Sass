{% load static %}
<div class="custom-footer mt-4"> <div class="container">
        <div class="footer-content p-3 p-md-4"> 
            <div class="row g-3 align-items-start"> <div class="col-lg-4 col-md-6 mb-3 mb-lg-0">
                    <h3 class="footer-title fs-5">Dogstore</h3> <p class="small mb-2">El supermercado de tu mejor amigo, búscanos en las redes sociales.</p>
                    <div class="social-links">
                        <a href="#"><i class="bi bi-instagram fs-5"></i></a>
                        <a href="#"><i class="bi bi-facebook fs-5"></i></a>
                        <a href="#"><i class="bi bi-whatsapp fs-5"></i></a>
                    </div>
                </div>

                <div class="col-lg-4 col-md-6 text-md-center mb-3 mb-lg-0">
                    <h3 class="footer-title fs-5">Revisa nuestros productos</h3>
                    <ul class="list-unstyled footer-links small">
                        {% for categoria in categorias|slice:":3" %}
                            <li><a href="{% url 'productos_categoria' categoria.slug %}" class="text-decoration-none text-reset">{{ categoria.nombre }}</a></li>
                        {% endfor %}
                    </ul>
                </div>

                <div class="col-lg-4 col-md-12 text-lg-start text-center">
                    <h3 class="footer-title fs-5">Contacto</h3>
                    <p class="small mb-0"> Mordor #123</p>
                    <p class="small mb-0"> +56 9 7777777</p>
                </div>

            </div>

            <div class="row mt-3">
                <div class="col-12 text-center">
                    <hr class="footer-divider my-2"> <p class="copyright small">© {% now "Y" %} Dogstore.</p>
                </div>
            </div>
        </div>
    </div>
</div>
